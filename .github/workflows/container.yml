name: container

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    # Provides COSIGN_PRIVATE_KEY / COSIGN_PASSWORD (provisioned from
    # infrastructure ansible/playbooks/cosign-signing-key.yml — the org's
    # shared image-signing key, same anchor as Cognitive-Hive-OS images).
    environment: release-signing
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to STACKIT registry
        uses: docker/login-action@v3
        with:
          registry: registry.onstackit.cloud
          username: ${{ secrets.STACKIT_REGISTRY_USERNAME }}
          password: ${{ secrets.STACKIT_REGISTRY_PASSWORD }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: registry.onstackit.cloud/senticor/organigram
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable=${{ github.ref_name == 'main' }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # The STACKIT registry project `senticor` enforces a cosign-signature
      # policy: unsigned manifests are refused at pull time with HTTP 412
      # PROJECTPOLICYVIOLATION (infrastructure#616 — this blocked openDesk
      # wakes). Sign the pushed digest with the org image-signing key using
      # the legacy detached .sig tag, which is what Harbor's policy checks
      # (cosign v2.x default; v3 flipped the default to the OCI referrers
      # bundle, which Harbor does NOT count — keep the version pinned, see
      # infrastructure#508).
      - name: Install cosign CLI
        env:
          COSIGN_VERSION: v2.5.3
          # https://github.com/sigstore/cosign/releases/download/v2.5.3/cosign_checksums.txt
          COSIGN_SHA256: 783b5d6c74105401c63946c68d9b2a4e1aab3c8abce043e06b8510b02b623ec9
        run: |
          set -euo pipefail
          DEST="${RUNNER_TEMP}/cosign-bin"; BIN="${DEST}/cosign"
          mkdir -p "$DEST"
          curl -fsSL -o "$BIN" \
            "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64"
          echo "${COSIGN_SHA256}  ${BIN}" | sha256sum -c -
          chmod +x "$BIN"; echo "$DEST" >> "$GITHUB_PATH"

      - name: Sign image digest with cosign
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          IMAGE: registry.onstackit.cloud/senticor/organigram
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          test -n "$DIGEST"
          cosign sign --yes --tlog-upload=false \
            --key env://COSIGN_PRIVATE_KEY \
            "${IMAGE}@${DIGEST}"
          echo "Signed ${IMAGE}@${DIGEST}"

      - name: Verify pull is no longer policy-blocked
        env:
          IMAGE: registry.onstackit.cloud/senticor/organigram
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          # A HEAD via docker manifest inspect exercises the same Harbor
          # policy gate that broke the openDesk wake (412 on unsigned).
          docker manifest inspect "${IMAGE}@${DIGEST}" >/dev/null
          echo "Manifest for ${IMAGE}@${DIGEST} is pullable (policy satisfied)"
          echo "### organigram image signed" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${IMAGE}@${DIGEST}\` — pin this digest in infrastructure \`terraform/gcp-opendesk/kubernetes/organigram/deployment.yaml\`" >> "$GITHUB_STEP_SUMMARY"
