apiVersion: apps/v1
kind: Deployment
metadata:
  name: organigram
  namespace: organigram
  labels:
    app.kubernetes.io/name: organigram
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: organigram-opendesk
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: organigram
  template:
    metadata:
      labels:
        app.kubernetes.io/name: organigram
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: organigram-opendesk
    spec:
      containers:
        - name: organigram
          image: registry.onstackit.cloud/senticor/organigram:latest
          env:
            - name: ORGANIGRAM_OPENDESK_ENABLED
              value: "false"
            - name: ORGANIGRAM_OPENDESK_PORTAL_URL
              value: ""
            - name: ORGANIGRAM_OPENDESK_ICS_URL
              value: ""
            - name: ORGANIGRAM_OPENDESK_KEYCLOAK_ISSUER_URL
              value: ""
            - name: ORGANIGRAM_OPENDESK_OIDC_CLIENT_ID
              value: "organigram"
            - name: ORGANIGRAM_OPENDESK_POST_LOGOUT_REDIRECT_URL
              value: ""
            - name: ORGANIGRAM_OPENDESK_NAVIGATION_LANGUAGE
              value: "de-DE"
            - name: ORGANIGRAM_OPENDESK_SUITE_LABEL
              value: "openDesk"
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
