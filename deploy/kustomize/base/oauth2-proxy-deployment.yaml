apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: organigram
  labels:
    app.kubernetes.io/name: oauth2-proxy
    app.kubernetes.io/component: auth-proxy
    app.kubernetes.io/part-of: organigram-opendesk
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: oauth2-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oauth2-proxy
        app.kubernetes.io/component: auth-proxy
        app.kubernetes.io/part-of: organigram-opendesk
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
          args:
            - --provider=keycloak-oidc
            - --oidc-issuer-url=https://id.example.com/realms/opendesk
            - --scope=openid profile email
            - --insecure-oidc-allow-unverified-email=true
            - --email-domain=*
            - --upstream=http://organigram.organigram.svc.cluster.local:80
            - --http-address=0.0.0.0:4180
            - --redirect-url=https://organigram.example.com/oauth2/callback
            - --cookie-domain=.example.com
            - --cookie-secure=true
            - --cookie-samesite=lax
            - --reverse-proxy=true
            - --skip-provider-button=true
          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: organigram-oauth2-proxy-secrets
                  key: client-id
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: organigram-oauth2-proxy-secrets
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: organigram-oauth2-proxy-secrets
                  key: cookie-secret
          ports:
            - containerPort: 4180
              name: http
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
