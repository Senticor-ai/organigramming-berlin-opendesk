apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: organigram
spec:
  template:
    spec:
      containers:
        - name: oauth2-proxy
          args:
            - --provider=keycloak-oidc
            - --oidc-issuer-url=https://id.cognitive-hive.ai/realms/opendesk
            - --code-challenge-method=S256
            - --scope=openid profile email
            - --insecure-oidc-allow-unverified-email=true
            - --email-domain=*
            - --whitelist-domain=.cognitive-hive.ai
            - --upstream=http://organigram.organigram.svc.cluster.local:80
            - --http-address=0.0.0.0:4180
            - --redirect-url=https://organigram.cognitive-hive.ai/oauth2/callback
            - --cookie-domain=.cognitive-hive.ai
            - --cookie-secure=true
            - --cookie-samesite=lax
            - --reverse-proxy=true
            - --skip-provider-button=true
            - --pass-access-token=true
            - --pass-user-headers=true
